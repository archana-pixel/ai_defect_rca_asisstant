name: Run AI Defect RCA Automatically

# Trigger workflow on push or manual run
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  rca-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Set environment variables for OpenAI
      - name: Load OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: echo "OpenAI API key loaded"

      # 5️⃣ Run sample RCA analysis
      - name: Run RCA Script
        run: |
          python scripts/sample_rca.py