name: Run AI Defect RCA Automatically

# Trigger workflow on push to master or manual run
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  rca-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run sample RCA script with OpenAI key
      - name: Run Sample RCA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/sample_rca.py